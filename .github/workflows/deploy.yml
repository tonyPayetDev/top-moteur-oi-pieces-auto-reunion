name: Deploy to Coolify

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        log-public-key: false
    
    - name: Add host to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 158.220.127.234 >> ~/.ssh/known_hosts
    
    - name: Deploy via SSH
      run: |
        ssh root@158.220.127.234 "docker exec coolify bash -c 'cd /var/www/html && php artisan app:deploy z8kc4kcggw8o8ggks08gko4s'" || echo "SSH deployment failed"
