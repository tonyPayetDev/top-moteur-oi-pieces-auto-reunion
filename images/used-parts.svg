<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="recycleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78"/>
      <stop offset="100%" style="stop-color:#38a169"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#f7fafc"/>
  
  <!-- Recycle symbol -->
  <g transform="translate(100, 100)">
    <!-- Arrow 1 -->
    <path d="M0,-50 L15,-25 L5,-25 L5,-10 L-5,-10 L-5,-25 L-15,-25 Z" fill="url(#recycleGrad)" transform="rotate(0)"/>
    
    <!-- Arrow 2 -->
    <path d="M0,-50 L15,-25 L5,-25 L5,-10 L-5,-10 L-5,-25 L-15,-25 Z" fill="url(#recycleGrad)" transform="rotate(120)"/>
    
    <!-- Arrow 3 -->
    <path d="M0,-50 L15,-25 L5,-25 L5,-10 L-5,-10 L-5,-25 L-15,-25 Z" fill="url(#recycleGrad)" transform="rotate(240)"/>
  </g>
  
  <!-- Car part in center -->
  <rect x="75" y="85" width="50" height="30" rx="5" fill="#4a5568"/>
  <circle cx="85" cy="115" r="8" fill="#718096"/>
  <circle cx="115" cy="115" r="8" fill="#718096"/>
  <rect x="95" y="75" width="10" height="15" fill="#2d3748"/>
</svg>
