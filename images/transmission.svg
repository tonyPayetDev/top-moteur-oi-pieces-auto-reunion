<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="transGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e55a2b"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#f7fafc"/>
  
  <!-- Gear 1 -->
  <circle cx="80" cy="85" r="35" fill="#4a5568"/>
  <circle cx="80" cy="85" r="20" fill="#718096"/>
  <circle cx="80" cy="85" r="8" fill="#cbd5e0"/>
  
  <!-- Gear teeth 1 -->
  <rect x="72" y="42" width="16" height="12" rx="2" fill="#4a5568"/>
  <rect x="72" y="116" width="16" height="12" rx="2" fill="#4a5568"/>
  <rect x="37" y="78" width="12" height="16" rx="2" fill="#4a5568"/>
  <rect x="111" y="78" width="12" height="16" rx="2" fill="#4a5568"/>
  
  <!-- Gear 2 -->
  <circle cx="130" cy="125" r="28" fill="url(#transGrad)"/>
  <circle cx="130" cy="125" r="15" fill="#fff"/>
  <circle cx="130" cy="125" r="6" fill="#4a5568"/>
  
  <!-- Gear teeth 2 -->
  <rect x="123" y="90" width="14" height="10" rx="2" fill="url(#transGrad)"/>
  <rect x="123" y="150" width="14" height="10" rx="2" fill="url(#transGrad)"/>
  <rect x="95" y="118" width="10" height="14" rx="2" fill="url(#transGrad)"/>
  <rect x="155" y="118" width="10" height="14" rx="2" fill="url(#transGrad)"/>
</svg>
