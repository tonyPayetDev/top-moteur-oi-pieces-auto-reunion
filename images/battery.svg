<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="elecGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e55a2b"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#f7fafc"/>
  
  <!-- Battery body -->
  <rect x="45" y="60" width="110" height="90" rx="8" fill="#2d3748"/>
  
  <!-- Battery top -->
  <rect x="60" y="45" width="25" height="20" rx="3" fill="#4a5568"/>
  <rect x="115" y="45" width="25" height="20" rx="3" fill="#4a5568"/>
  
  <!-- Terminals -->
  <rect x="68" y="35" width="10" height="15" fill="#cbd5e0"/>
  <rect x="123" y="35" width="10" height="15" fill="#cbd5e0"/>
  
  <!-- Plus sign -->
  <rect x="70" y="85" width="20" height="6" rx="1" fill="url(#elecGrad)"/>
  <rect x="77" y="78" width="6" height="20" rx="1" fill="url(#elecGrad)"/>
  
  <!-- Minus sign -->
  <rect x="110" y="85" width="20" height="6" rx="1" fill="#cbd5e0"/>
  
  <!-- Lightning bolt -->
  <polygon points="100,100 90,120 105,120 95,140 115,115 100,115" fill="#ffd700"/>
</svg>
