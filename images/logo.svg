      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e55627"/>
    </linearGradient>
  </defs>
  <!-- Engine icon -->
  <g transform="translate(10, 10)">
    <rect x="5" y="15" width="30" height="20" rx="3" fill="url(#engineGradient)"/>
