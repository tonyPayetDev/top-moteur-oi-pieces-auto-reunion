    <rect x="20" y="10" width="8" height="8" rx="1" fill="#333"/>
    <rect x="0" y="20" width="8" height="10" rx="2" fill="#555"/>
    <rect x="32" y="20" width="8" height="10" rx="2" fill="#555"/>
    <circle cx="20" cy="25" r="6" fill="#fff"/>
    <circle cx="20" cy="25" r="3" fill="#333"/>
  </g>
  <!-- Text -->
  <text x="55" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Top Moteur</text>
  <text x="55" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ff6b35">OI</text>
