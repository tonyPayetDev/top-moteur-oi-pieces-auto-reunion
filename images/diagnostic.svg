<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e55a2b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f7fafc" rx="20"/>
  
  <!-- Diagnostic Tool Body -->
  <rect x="80" y="50" width="240" height="160" rx="15" fill="#2d3748"/>
  <rect x="90" y="60" width="220" height="120" rx="10" fill="#1a202c"/>
  
  <!-- Screen -->
  <rect x="100" y="70" width="200" height="100" rx="5" fill="#48bb78"/>
  
  <!-- Screen content - graph -->
  <polyline points="110,140 130,130 150,145 170,120 190,135 210,110 230,125 250,115 270,100 290,110" 
            fill="none" stroke="#1a202c" stroke-width="2"/>
  <circle cx="210" cy="110" r="4" fill="#ff6b35"/>
  
  <!-- Text lines on screen -->
  <rect x="110" y="80" width="60" height="4" fill="#1a202c" opacity="0.5"/>
  <rect x="110" y="90" width="40" height="4" fill="#1a202c" opacity="0.5"/>
  
  <!-- Buttons -->
  <circle cx="110" cy="200" r="12" fill="url(#toolGrad)"/>
  <circle cx="150" cy="200" r="12" fill="#4a5568"/>
  <circle cx="190" cy="200" r="12" fill="#4a5568"/>
  <circle cx="230" cy="200" r="12" fill="#4a5568"/>
  
  <!-- Cable -->
  <path d="M280 130 Q320 130 320 180 L320 250" fill="none" stroke="#2d3748" stroke-width="8"/>
  <rect x="310" y="250" width="20" height="30" fill="#4a5568" rx="3"/>
  
  <!-- OBD Connector -->
  <rect x="305" y="280" width="30" height="15" fill="#2d3748" rx="3"/>
</svg>
