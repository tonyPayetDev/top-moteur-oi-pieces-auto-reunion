<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="engineGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e55a2b"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#f7fafc"/>
  
  <!-- Engine block -->
  <rect x="40" y="70" width="120" height="80" rx="8" fill="url(#engineGrad2)"/>
  
  <!-- Cylinders -->
  <rect x="55" y="50" width="30" height="35" rx="4" fill="#4a5568"/>
  <rect x="95" y="50" width="30" height="35" rx="4" fill="#4a5568"/>
  
  <!-- Side pipes -->
  <rect x="25" y="85" width="25" height="50" rx="6" fill="#718096"/>
  <rect x="150" y="85" width="25" height="50" rx="6" fill="#718096"/>
  
  <!-- Central pulley -->
  <circle cx="100" cy="115" r="25" fill="#fff"/>
  <circle cx="100" cy="115" r="15" fill="#2d3748"/>
  <circle cx="100" cy="115" r="5" fill="#718096"/>
  
  <!-- Bolts -->
  <circle cx="55" cy="95" r="4" fill="#cbd5e0"/>
  <circle cx="145" cy="95" r="4" fill="#cbd5e0"/>
  <circle cx="55" cy="135" r="4" fill="#cbd5e0"/>
  <circle cx="145" cy="135" r="4" fill="#cbd5e0"/>
</svg>
